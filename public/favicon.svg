  <!-- Left chair seat -->
  <path d="M12 38 L22 38" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Left chair front leg -->
  <path d="M22 38 L22 44" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Left chair back leg -->
  <path d="M12 38 L12 44" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Left chair back top -->
  <path d="M10 22 L14 22" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Right chair back -->
  <path d="M52 22 L52 38" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Right chair seat -->
  <path d="M42 38 L52 38" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Right chair front leg -->
  <path d="M42 38 L42 44" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Right chair back leg -->
  <path d="M52 38 L52 44" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Right chair back top -->
  <path d="M50 22 L54 22" stroke="#b8868e" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Table top -->
