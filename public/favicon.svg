  <!-- Table leg -->
  <path d="M32 39 L32 46" stroke="#b8868e" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Table base -->
  <path d="M28 46 L36 46" stroke="#b8868e" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Small decorative flower on table -->
  <circle cx="32" cy="33.5" r="1.5" fill="#c9a66b" opacity="0.6"/>
  <circle cx="30" cy="33" r="0.8" fill="#b8868e" opacity="0.4"/>
  <circle cx="34" cy="33" r="0.8" fill="#b8868e" opacity="0.4"/>
